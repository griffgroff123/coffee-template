<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Visit Us | Ridgeline Coffee Co.</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,400;0,500;0,600;1,500&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <header>
    <h1>Ridgeline Coffee Co.</h1>
    <nav id="nav-links">
      <a href="index.html">Home</a>
      <a href="menu.html">Menu</a>
      <a href="why-us.html">Why Us</a>
      <a href="reviews.html">Reviews</a>
      <a href="contact.html">Visit Us</a>
    </nav>
    <button id="nav-toggle" aria-label="Toggle navigation menu">☰</button>
  </header>

  <main class="visit-page">
    <div class="section-heading">
      <p class="eyebrow">Find us</p>
      <h2>Visit Us</h2>
    </div>

    <div class="visit-tabs">
      <button class="menu-tab menu-tab-active" id="tab-info" type="button">Location & hours</button>
      <button class="menu-tab" id="tab-form" type="button">Send a message</button>
    </div>

    <div id="panel-info" class="visit-panel">
      <div class="locations">
        <div class="location-card">
          <h3>Leavenworth — West Side</h3>
          <p class="location-address">212 Front St<br>Leavenworth, WA 98826</p>
          <p class="location-phone"><a href="tel:5415550192">(509) 555-0147</a></p>
          <p class="location-hours">
            Mon&ndash;Fri: 6:00am &ndash; 5:00pm<br>
            Sat&ndash;Sun: 7:00am &ndash; 4:00pm
          </p>
        </div>
      </div>
    </div>

    <div id="panel-form" class="visit-panel" style="display: none;">
      <form id="contact-form" action="https://formspree.io/f/YOUR_FORM_ID" method="POST">
        <label for="name">Name</label>
        <input type="text" id="name" name="name" required>

        <label for="email">Email</label>
        <input type="email" id="email" name="email" required>

        <label for="message">Message</label>
        <textarea id="message" name="message" rows="5" required></textarea>

        <button type="submit">Send Message</button>
      </form>
    </div>
  </main>

  <footer>
    <p>&copy; 2026 Ridgeline Coffee Co. — Leavenworth, WA</p>
  </footer>

  <script src="js/visit-tabs.js"></script>
  <script src="js/nav-toggle.js"></script>
</body>
</html>
